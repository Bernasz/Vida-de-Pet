<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Background Registration Form</title>
    <link rel="stylesheet" href="register.css"> <!-- Corrigido para 'register.css' -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <img src="imgs/cachorro2.jpg" alt="Background Image">
    <div class="container">
        <form action="#">
            <h1>Register</h1>

            <div class="input-box">
                <input type="text" placeholder="Name" required>
                <i class='bx bx-user'></i>
            </div>

            <div class="input-box">
                <input type="email" placeholder="Email" required>
                <i class='bx bx-envelope'></i>
            </div>

            <div class="input-box">
                <input type="tel" placeholder="Phone Number" required>
                <i class='bx bx-phone'></i>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
                <i class='bx bx-lock-alt'></i>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Confirm Password" required>
                <i class='bx bx-lock-alt'></i>
            </div>

            <button class="btn">Register</button>
            <div class="login">
                <p>Already have an account? <a href="login.html">Login</a></p> <!-- Atualizado para linkar com 'login.html' -->
            </div>
        </form>
    </div>
</body>
</html>
